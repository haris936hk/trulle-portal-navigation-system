<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trulle Portal — Preview</title>
    <style>
      /* Base layout to match the portal's cinematic experience */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #fcfcfc;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 
         The container for the portal system. 
         In production, this is embedded in a WordPress page.
      */
      .trulle-portal-root {
        width: 100vw;
        height: 100vh;
        /* Maintaining the 16:9 aspect ratio container logic if needed, 
           though the CSS handles this internally. */
        position: relative;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!-- 
      The mount point for the React Portal System.
      Optional data-portals attribute can be added here for local overrides:
      data-portals='[{"id":1,"destination":"/test-pages/destination-1.html"}]'
    -->
    <div class="trulle-portal-root" data-trulle-portal-root="1"></div>

    <!-- Main entry point for Vite dev server -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
