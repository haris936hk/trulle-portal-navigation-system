<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trulle Portal — Preview</title>
    <style>
      /* Base layout to match the portal's cinematic experience */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #fcfcfc;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 
         The container for the portal system. 
         In production, this is embedded in a WordPress page.
      */
      .trulle-portal-root {
        width: 100vw;
        height: 100vh;
        /* Maintaining the 16:9 aspect ratio container logic if needed, 
           though the CSS handles this internally. */
        position: relative;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!--
      TEST-ONLY: simulates the Elementor widget's "Portal Rows" repeater output
      (see wordpress/trulle-portal-elementor/widgets/class-trulle-portal-config-widget.php)
      so different content combos can be previewed locally before uploading the plugin.
      Each portal below exercises a different combo an editor might configure:
        1 - label + destination + image preview
        2 - label + destination + a different image preview
        3 - label + destination + video preview (peephole plays a video)
        4 - destination only, no label/preview (tests default label + empty peephole)
        5 - omitted entirely (tests an unconfigured/disabled row: ring shows, no click/peephole)
    -->
    <div
      class="trulle-portal-root"
      data-trulle-portal-root="1"
      data-portals='[
        {"id":1,"label":"Shop","destination":"/test-pages/destination-1.html","preview":"/media/portal-1.png"},
        {"id":2,"label":"About Us","destination":"/test-pages/destination-2.html","preview":"/images/preview2.png"},
        {"id":3,"label":"Watch Reel","destination":"/test-pages/destination-3.html","preview":"/media/4K%20Relaxing%20Nature%20Sounds%20-%20Short%20Video%20Clips%20of%20Nature.mp4"},
        {"id":4,"destination":"/test-pages/destination-4.html"}
      ]'
    ></div>

    <!-- Main entry point for Vite dev server -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
